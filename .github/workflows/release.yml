name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cursus-client/${{ inputs.version }}/
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Set version
        run: sed -i "s/version = \".*\"/version = \"${{ inputs.version }}\"/" pyproject.toml

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/cursus/ --ignore-missing-imports

      - name: Unit tests
        run: uv run pytest tests/unit/ -v

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create Git tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: Cursus Python Client v${{ inputs.version }}
          generate_release_notes: true
          files: dist/*
          body: |
            Cursus Python Client v${{ inputs.version }} is the Python SDK release for the Cursus message broker.

            ## Highlights

            - Producer support with partition batching, compression, and idempotent delivery.
            - Consumer support for polling, streaming, consumer groups, offset commits, and rebalance handling.
            - EventStore support for event sourcing with optimistic concurrency and snapshots.
            - Sync and async APIs for producer, consumer, and event-store workflows.
            - Strict protocol response parsing aligned with the normalized Cursus broker contract.

            ## Requirements

            - Python 3.10 or later.
            - A running Cursus broker, usually on `localhost:9000` for local development.

            ## Install

            ```bash
            pip install cursus-client==${{ inputs.version }}
            ```

            Optional compression extras:

            ```bash
            pip install "cursus-client[snappy]==${{ inputs.version }}"
            pip install "cursus-client[lz4]==${{ inputs.version }}"
            ```

            ## Quick Start

            ```python
            from cursus import Producer, ProducerConfig, Acks

            config = ProducerConfig(
                brokers=["localhost:9000"],
                topic="my-topic",
                partitions=4,
                acks=Acks.ONE,
            )

            with Producer(config) as producer:
                producer.send("Hello, Cursus!")
                producer.flush()
            ```

            ## Package Links

            - PyPI: https://pypi.org/project/cursus-client/${{ inputs.version }}/
            - GitHub: https://github.com/cursus-io/cursus-python

            ## Assets

            The release assets include the Python wheel and source distribution published to PyPI.
