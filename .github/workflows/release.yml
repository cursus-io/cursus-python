name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cursus-client/${{ inputs.version }}/
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Validate release version
        shell: bash
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z]+)*$ ]]; then
            echo "version must be a package version like 0.1.0 or 0.1.1-rc.1; do not include a leading v"
            exit 1
          fi

      - name: Set version
        run: sed -i "s/version = \".*\"/version = \"${{ inputs.version }}\"/" pyproject.toml

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/cursus/ --ignore-missing-imports

      - name: Unit tests
        run: uv run pytest tests/unit/ -v

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create Git tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: Cursus Python Client v${{ inputs.version }}
          generate_release_notes: true
          files: dist/*
          body: |
            ## Install

            ```bash
            pip install cursus-client==${{ inputs.version }}
            ```

            Optional compression extras:

            ```bash
            pip install "cursus-client[snappy]==${{ inputs.version }}"
            pip install "cursus-client[lz4]==${{ inputs.version }}"
            ```

            ## Import

            ```python
            from cursus import Producer, Consumer, EventStore
            ```

            ## Compatibility

            - Python 3.10 or later.
            - Requires a running Cursus broker.

            ## Links

            - PyPI: https://pypi.org/project/cursus-client/${{ inputs.version }}/
            - Documentation: https://github.com/cursus-io/cursus-python#readme
